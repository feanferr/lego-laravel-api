version: "3.8"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lego_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - lego_network

  web:
    image: nginx:latest
    container_name: lego_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lego_network

  db:
    image: postgres:15
    container_name: lego_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lego
      POSTGRES_USER: lego
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - lego_network

volumes:
  postgres_data:

networks:
  lego_network: